<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Prediction Result - Brain Tumour Detection</title>
  <link href="../static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../static/css/styles.css" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header id="header" class="fixed-top header-transparent">
    <div class="container d-flex align-items-center justify-content-between">
      <h1 class="logo"><a href="/">Brain Tumour</a></h1>
      <nav id="navbar" class="navbar">
        <ul>
          <li><a class="nav-link scrollto" href="{{ url_for('first')}}">Home</a></li>
          <li><a class="nav-link scrollto" href="{{ url_for('login')}}">Login</a></li>
          <li><a class="nav-link scrollto" href="{{ url_for('index')}}">Predict</a></li>
		   <li><a class="nav-link scrollto" href="{{ url_for('performance')}}">Performance Analysis</a></li>
        </ul>
        <i class="bi bi-list mobile-nav-toggle"></i>
      </nav>
    </div>
  </header>

  <section id="hero" class="d-flex align-items-center justify-content-center">
    <div class="container position-relative">
      <h1>Prediction Result</h1>
    </div>
  </section>

  <section id="services" class="services">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card mx-auto">
            <div class="card-body text-center p-5">
              <h2 class="card-title mb-4">Here's the result of testing using image processing</h2>
              {% if processed_file %}
              <img src="data:image/png;base64,{{ processed_file }}" alt="Processed Image" class="img-fluid mb-4 rounded shadow" style="max-height: 400px;">
              {% endif %}
              <div class="alert alert-{{ danger }} mb-4" role="alert">
                <h4 class="alert-heading">Prediction</h4>
                <p class="mb-0">{{ out_pred }}</p>
                <hr>
                <p class="mb-0"><strong>Confidence: {{ "%.2f"|format(out_prob) }}%</strong></p>
              </div>

              <a href="{{ url_for('chart') }}" class="btn btn-info me-2">View Chart</a>
              <a href="{{ url_for('index') }}" class="btn btn-primary">Try Another Image</a>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>




  <script src="../static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
