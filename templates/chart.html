<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Chart - Brain Tumour Detection</title>
  <link href="../static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../static/css/styles.css" rel="stylesheet">
</head>
<body>
  <!-- Header same as result_working -->
  <header id="header" class="fixed-top header-transparent">
    <div class="container d-flex align-items-center justify-content-between">
      <h1 class="logo"><a href="/">Brain Tumour</a></h1>
      <nav id="navbar" class="navbar">
        <ul>
          <li><a class="nav-link scrollto" href="{{ url_for('first')}}">Home</a></li>
          <li><a class="nav-link scrollto" href="{{ url_for('login')}}">Login</a></li>
          <li><a class="nav-link scrollto" href="{{ url_for('index')}}">Predict</a></li>
          <li><a class="nav-link scrollto active" href="{{ url_for('chart')}}">Chart</a></li>
          <li><a class="nav-link scrollto" href="{{ url_for('performance')}}">Performance</a></li>
        </ul>
        <i class="bi bi-list mobile-nav-toggle"></i>
      </nav>
    </div>
  </header>

  <section id="hero" class="d-flex align-items-center justify-content-center">
    <div class="container position-relative">
      <h1>Prediction Statistics Chart</h1>
    </div>
  </section>

  <section id="services" class="services">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card mx-auto">
            <div class="card-body text-center p-5">
              <h2 class="card-title mb-4">Model Performance Chart</h2>
              <p class="mb-4">Overall accuracy: 97.5% on test dataset</p>
              <canvas id="chartCanvas" width="300" height="250">
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('chartCanvas').getContext('2d');
    new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Brain Tumor (Correct)', 'Brain Tumor (Wrong)', 'Normal (Correct)', 'Normal (Wrong)'],
        datasets: [{
          data: [120, 3, 125, 2],
          backgroundColor: ['#dc3545', '#ffc107', '#28a745', '#ffc107']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: {
            display: true,
            text: 'Dataset Distribution (475 test images)'
          }
        }
      }
    });
  </script>

  <script src="../static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
